server:
  port: 8085
spring:
  application:
    name: resource-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mpscc}
    username: ${SPRING_DATASOURCE_USERNAME:mpscc}
    password: ${SPRING_DATASOURCE_PASSWORD:mpscc_dev_change_me}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
