name: mpscc

services:
  # ---------------- infrastructure ----------------
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpscc}
      POSTGRES_USER: ${POSTGRES_USER:-mpscc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mpscc_dev_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    ports: ["20004:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mpscc} -d ${POSTGRES_DB:-mpscc}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redisdata:/data]
    ports: ["20005:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.8
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes: [kafkadata:/bitnami/kafka]
    ports: ["20006:9092"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  # ---------------- application services ----------------
  auth-service:
    build: { context: ., dockerfile: services/auth-service/Dockerfile }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mpscc}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mpscc}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-mpscc_dev_change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me_dev_secret_at_least_64_bytes_long_padding_padding_padding}
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["20002:8081"]
    restart: unless-stopped

  api-gateway:
    build: { context: ., dockerfile: services/api-gateway/Dockerfile }
    environment:
      JWT_SECRET: ${JWT_SECRET:-change_me_dev_secret_at_least_64_bytes_long_padding_padding_padding}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:20000}
      AUTH_SERVICE_URI: http://auth-service:8081
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on: [auth-service]
    ports: ["20001:8080"]
    restart: unless-stopped

  resource-service:
    build: { context: ., dockerfile: services/resource-service/Dockerfile }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mpscc}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mpscc}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-mpscc_dev_change_me}
      JAVA_TOOL_OPTIONS: "-Xmx512m"
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["20003:8085"]
    restart: unless-stopped

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    ports: ["20000:80"]
    depends_on: [api-gateway]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  kafkadata:
