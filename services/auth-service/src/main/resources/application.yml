server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mpscc}
    username: ${SPRING_DATASOURCE_USERNAME:mpscc}
    password: ${SPRING_DATASOURCE_PASSWORD:mpscc_dev_change_me}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
mpscc:
  jwt:
    secret: ${JWT_SECRET:change_me_dev_secret_at_least_64_bytes_long_padding_padding_padding}
    ttl-millis: 28800000   # 8h
management:
  endpoints:
    web:
      exposure:
        include: health,info
